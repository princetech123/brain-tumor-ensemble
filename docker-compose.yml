version: '3.8'

services:
  web:
    build: .
    container_name: neuro_ensemble_app
    ports:
      - "5001:5001"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
